<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  
  <title>Frontend Mentor | Social links profile</title>

</head>
<body>
  <main class="main-container grid-content-centered">
    <div class="card-container grid-content-centered">
      <div class="profile-pic-container grid-content-centered">
        <img class="profile-pic" src="./assets/images/avatar-jessica.jpeg" alt="Profile picture of Jessica Randall">
      </div>
      <div class="name-location-container">
        <h1 class="name-text text-preset-1">Jessica Randall</h1>
        <p class="location-text text-preset-2-bold">London, United Kingdom</p>
      </div>
      <div class="bio-container text-preset-2">
        "Front-end developer and avid reader."
      </div>
      <div class="social-links-container grid-content-centered">
        <a href="https://github.com" class="social-link-container text-preset-2-bold">
          GitHub
        </a>
        <a href="https://www.frontendmentor.io" class="social-link-container text-preset-2-bold">Frontend Mentor</a>
        <a href="https://www.linkedin.com" class="social-link-container text-preset-2-bold">LinkedIn</a>
        <a href="https://twitter.com" class="social-link-container text-preset-2-bold">Twitter</a>
        <a href="https://www.instagram.com" class="social-link-container text-preset-2-bold">Instagram</a>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Ryan Evans</a>.
  </footer>
</body>
</html>
